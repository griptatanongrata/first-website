<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://kit.fontawesome.com/1ce2ca0a57.js"
      crossorigin="anonymous"
    ></script>
    <script src="index.js"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap");
    </style>
    <title>My First Website</title>
  </head>
  <body>
    <section class="landing">
      <nav>
        <div class="row nav__row">
          <div class="nav__logo">
            <img
              src="https://module-2-fp-example-website.vercel.app/assets/logo.2c489fc453a1783cbadacf914efa3df6.svg"
              alt="LOGO"
              class="nav__logo--img"
            />
            <div class="nav__logo--title">Treact</div>
          </div>
          <div class="nav__links">
            <a href="#" class="nav__link">About</a>
            <a href="#" class="nav__link">Blog</a>
            <a href="#" class="nav__link">Pricing</a>
            <a href="#" class="nav__link">Contact Us</a>
            <a href="#" class="nav__link">Login</a>
            <a href="#" class="nav__link nav__link--primary">Sign Up</a>
          </div>
          <button class="btn__menu" onclick="openMenu()"></button>
        </div>
      </nav>
      <div class="menu">
        <button
          class="btn__menu btn__menu--close"
          onclick="closeMenu()"
        ></button>
        <div class="menu__links">
          <a href="#about" class="menu__link" onclick="closeMenu()">About</a>
          <a href="#blog" class="menu__link" onclick="closeMenu()">Blog</a>
          <a href="#pricing" class="menu__link" onclick="closeMenu()"
            >Pricing</a
          >
          <a href="#contactus" class="menu__link" onclick="closeMenu()"
            >Contact Us</a
          >
          <a href="#login" class="menu__link" onclick="closeMenu()">Login</a>
          <a href="#signup" class="menu__link" onclick="closeMenu()">Sign Up</a>
        </div>
      </div>
    </section>
  </body>
</html>
